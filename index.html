<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kado - Japanese Flashcard Sheets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">A4 FLASHCARD MAKER</p>
      <h1>Kado <span>カード</span></h1>
      <p class="subtitle">Create, print, flip, cut. Twenty-five cards per sheet.</p>
    </div>
    <div class="header-mark" aria-hidden="true">あ</div>
  </header>

  <main class="app-shell">
    <section class="toolbar" aria-label="Sheet controls">
      <div class="toolbar-group primary-actions">
        <button id="printBtn" class="button button-primary" type="button">Print / Save PDF</button>
        <button id="clearBtn" class="button" type="button">Clear all</button>
      </div>

      <div class="toolbar-group">
        <label class="select-label" for="backLayout">Back layout</label>
        <select id="backLayout">
          <option value="normal">Normal</option>
          <option value="mirrored">Mirrored for duplex</option>
        </select>
      </div>

      <div class="toolbar-group file-actions">
        <button id="saveBtn" class="button button-quiet" type="button">Save JSON</button>
        <button id="loadBtn" class="button button-quiet" type="button">Load JSON</button>
        <input id="loadInput" type="file" accept=".json,application/json" hidden>
        <button id="testBtn" class="button button-test" type="button" aria-pressed="false">Print Test Mode</button>
      </div>
    </section>

    <section class="workspace" aria-labelledby="editorHeading">
      <div class="sheet-heading">
        <div>
          <p class="section-kicker">FRONT EDITOR</p>
          <h2 id="editorHeading">A4 landscape <span>·</span> 5 × 5 grid</h2>
        </div>
        <div class="legend" aria-label="Field legend">
          <span><i class="dot dot-japanese"></i>Japanese</span>
          <span><i class="dot dot-romaji"></i>Romaji</span>
          <span><i class="dot dot-meaning"></i>Turkish back</span>
        </div>
      </div>

      <div class="sheet-stage">
        <div id="editorGrid" class="editor-sheet" aria-label="25-card editor"></div>
      </div>

      <div class="sheet-footer">
        <p><strong>Tip:</strong> Use your printer's actual-size or 100% scale setting. Disable fit-to-page.</p>
        <p id="status" class="status" role="status" aria-live="polite">Ready · changes save automatically</p>
      </div>
    </section>
  </main>

  <div id="printArea" class="print-area" aria-hidden="true">
    <section class="print-sheet front-sheet" aria-label="Flashcard fronts">
      <div id="frontPrintGrid" class="print-grid"></div>
    </section>
    <section class="print-sheet back-sheet" aria-label="Flashcard backs">
      <div id="backPrintGrid" class="print-grid"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
